<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="Ubdp1KStE2mw1NRtRYE08_fZU7bubSEnlvEOHM2USgs" />

    <title>Marcell | Web Developer Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#3b82f6' } } }
        }
    </script>
</head>
<body x-data="{ darkMode: false }" :class="darkMode ? 'dark bg-slate-900' : 'bg-slate-50'" class="transition-colors duration-300">

    <nav class="fixed w-full z-50 backdrop-blur-md border-b dark:border-slate-800 bg-white/80 dark:bg-slate-900/80">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black uppercase dark:text-white">Marcell<span class="text-primary">.</span>Dev</div>
            <button @click="darkMode = !darkMode" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800">
                <i :class="darkMode ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-slate-600'"></i>
            </button>
        </div>
    </nav>

    <section class="pt-48 pb-24 px-6">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-16">
            <div class="flex-1 text-center md:text-left">
                <h1 class="text-5xl md:text-7xl font-extrabold mb-6 dark:text-white">
                    Turning Ideas into <span class="text-primary italic">Reality.</span>
                </h1>
                <p class="text-lg text-slate-500 dark:text-slate-400 mb-10">
                    Halo, saya <b>Marcell</b>. Web Developer spesialis PHP & MySQL.
                </p>
                <a href="#contact" class="bg-primary text-white px-8 py-4 rounded-xl font-bold shadow-lg">Hubungi Saya</a>
            </div>
            
            <div class="flex-1 relative">
                <div class="w-64 h-64 md:w-80 md:h-80 bg-primary rounded-[3rem] rotate-12 absolute -bottom-6 -right-6 opacity-20 blur-2xl"></div>
                <img src="foto-marcell.jpg" 
                     alt="Marcell" 
                     onerror="this.src='https://ui-avatars.com/api/?name=Marcell&background=3b82f6&color=fff&size=512'" 
                     class="w-64 h-64 md:w-80 md:h-80 rounded-[2.5rem] shadow-2xl relative z-10 border-8 border-white dark:border-slate-800 object-cover">
            </div>
        </div>
    </section>

    <section id="projects" class="py-24 px-6 bg-white dark:bg-slate-900">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-4xl font-bold mb-16 text-center dark:text-white">My <span class="text-primary italic">Work</span></h2>
            <div class="grid md:grid-cols-2 gap-10">
                <div class="bg-slate-50 dark:bg-slate-800 rounded-[2rem] overflow-hidden shadow-2xl border dark:border-slate-700">
                    <div class="h-72 overflow-hidden">
                        <img src="dashboard-proyek.jpg" 
                             onerror="this.src='https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=800'" 
                             class="w-full h-full object-cover">
                    </div>
                    <div class="p-10">
                        <h4 class="text-2xl font-bold mb-4 dark:text-white">Inventory System</h4>
                        <p class="text-slate-500 dark:text-slate-400">Dashboard manajemen database menggunakan PHP dan MySQL.</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
